<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  </head>
  <body id="theme-body" class="light-theme">
    <div class="wrapper">
      <header>
        <div class="header-top">
          <h1><a href="{{ "/" | absolute_url }}">{{ site.title | default: site.github.repository_name }}</a></h1>
          <button id="theme-toggle" class="theme-toggle" title="Toggle Dark/Light Mode">🌙</button>
        </div>
        {% if site.logo %}
        <img src="{{site.logo | relative_url}}" alt="Logo" style="max-width: 10%;"/>
        {% endif %}
        <p>{{ site.description | default: site.github.project_tagline }}</p>
      </header>
      <section>
        {{ content }}
      </section>
      <footer>
        <!-- CUSTOMIZE YOUR FOOTER HERE -->
        <p>&copy; 2025 {{ site.title }}. All rights reserved.</p>
        <!-- Remove the lines below if you don't want credit links -->
        <!-- <p><small>Theme: <a href="https://github.com/pages-themes/time-machine">Time Machine</a></small></p> -->
      </footer>
    </div>
    <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
    <script>
      // Theme Switcher
      const themeToggle = document.getElementById('theme-toggle');
      const themeBody = document.getElementById('theme-body');
      
      // Load saved theme preference
      const savedTheme = localStorage.getItem('theme') || 'light-theme';
      themeBody.className = savedTheme;
      updateToggleButton();
      
      // Toggle theme on button click
      themeToggle.addEventListener('click', () => {
        const isLight = themeBody.classList.contains('light-theme');
        if (isLight) {
          themeBody.className = 'dark-theme';
          localStorage.setItem('theme', 'dark-theme');
        } else {
          themeBody.className = 'light-theme';
          localStorage.setItem('theme', 'light-theme');
        }
        updateToggleButton();
      });
      
      function updateToggleButton() {
        const isDark = themeBody.classList.contains('dark-theme');
        themeToggle.textContent = isDark ? '☀️' : '🌙';
      }
    </script>
  </body>
</html>
