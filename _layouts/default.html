<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1><a href="{{ "/" | absolute_url }}">{{ site.title | default: site.github.repository_name }}</a></h1>
        {% if site.logo %}
        <img src="{{site.logo | relative_url}}" alt="Logo" style="max-width: 10%;"/>
        {% endif %}
        <p>{{ site.description | default: site.github.project_tagline }}</p>
      </header>
      <section>
        {{ content }}
      </section>
      <footer>
        <!-- CUSTOMIZE YOUR FOOTER HERE -->
        <p>&copy; 2025 {{ site.title }}. All rights reserved.</p>
        <!-- Remove the lines below if you don't want credit links -->
        <!-- <p><small>Theme: <a href="https://github.com/pages-themes/time-machine">Time Machine</a></small></p> -->
      </footer>
    </div>
    <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
  </body>
</html>
