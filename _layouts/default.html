<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
    <style>
      .site-nav { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 14px; }
      .site-nav a { font-weight: 600; text-decoration: none; padding: 4px 0; border-bottom: 2px solid transparent; }
      .site-nav a:hover { border-bottom-color: currentColor; }
      .site-nav a.active { border-bottom-color: currentColor; }
    </style>
  </head>
  <body id="theme-body" class="light-theme">
    <div class="wrapper">
      <header>
        <div class="header-top">
          <h1><a href="{{ "/" | absolute_url }}">{{ site.title | default: site.github.repository_name }}</a></h1>
          <button id="theme-toggle" class="theme-toggle" title="Toggle Dark/Light Mode">🌙</button>
        </div>
        {% if site.logo %}<img src="{{site.logo | relative_url}}" alt="Logo" style="max-width: 10%;"/>{% endif %}
        <p>{{ site.description | default: site.github.project_tagline }}</p>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/about/' | relative_url }}">About</a>
          <a href="{{ '/projects/' | relative_url }}">Projects</a>
          <a href="{{ '/publications/' | relative_url }}">Publications</a>
          <a href="{{ '/contact/' | relative_url }}">Contact</a>
        </nav>
      </header>
      <section>{{ content }}</section>
      <footer>
        <p>&copy; 2026 {{ site.title }}. All rights reserved.</p>
      </footer>
    </div>
    <script>
      const toggle = document.getElementById('theme-toggle');
      const body = document.getElementById('theme-body');
      const theme = localStorage.getItem('theme') || 'light-theme';
      
      body.className = theme;
      
      toggle.addEventListener('click', () => {
        const newTheme = body.classList.contains('light-theme') ? 'dark-theme' : 'light-theme';
        body.className = newTheme;
        localStorage.setItem('theme', newTheme);
        toggle.textContent = newTheme === 'dark-theme' ? '☀️' : '🌙';
      });
      
      toggle.textContent = theme === 'dark-theme' ? '☀️' : '🌙';
    </script>
  </body>
</html>
